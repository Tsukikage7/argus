root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/argus-server ./cmd/server"
  bin = "./tmp/argus-server"
  full_bin = "./tmp/argus-server"
  include_ext = ["go", "yaml"]
  exclude_dir = ["tmp", "bin", "web", "vendor"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true

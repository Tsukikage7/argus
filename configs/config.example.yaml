app:
  name: argus
  addr: ":9999"
  api_keys: ["argus-demo-key"]
  admin_key: "argus-admin"

log:
  level: info
  format: json

providers:
  - name: dashscope
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${DASHSCOPE_API_KEY}"
    default_model: "qwen-plus"
    timeout: 120s
    max_tokens: 4096
    models: ["qwen-plus", "qwen-turbo", "qwen-max"]

agent:
  max_steps: 15
  auto_recover_threshold: 0.8
  confirm_threshold: 0.5
  timeout: 5m

elasticsearch:
  addresses: ["http://localhost:9200"]
  index_prefix: "argus"

redis:
  addr: "localhost:6379"

postgres:
  dsn: "postgres://argus:argus@localhost:5432/argus?sslmode=disable"

wechat:
  corp_id: "${WECHAT_CORP_ID}"
  agent_id: 0
  secret: "${WECHAT_SECRET}"

mock:
  enabled: true
  namespaces:
    - prj-apigateway
    - prj-uhost
    - prj-ubill
    - prj-uresource
    - prj-unet
    - prj-udb

replay:
  enabled: true
  default_fault_intensity: 1.0
  default_traffic_rate: 1.0
  max_duration: 30m
  auto_diagnose: true

monitor:
  enabled: true
  interval: 30s
  cooldown: 5m
  threshold: 5

live:
  rps: 5
  fault_rate: 0.1

# 多租户配置（默认关闭，启用后使用 PG 存储的 TenantKey 认证）
multi_tenant:
  enabled: false
  bootstrap_admin_keys: ["argus-admin"]
  allowed_origins: ["http://localhost:5173"]

<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argus · UCloud 智能日志诊断与故障恢复</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>tailwind.config={darkMode:['selector','[data-theme="dark"]']}</script>
  <style>
    :root { --brand: #6366f1; }
    [data-theme="light"] {
      --bg-body:#f1f5f9; --bg-card:#fff; --bg-card2:#f8fafc; --bg-input:#f1f5f9;
      --bg-step:#f8fafc; --bg-pre:#f1f5f9; --border:#e2e8f0;
      --text-1:#0f172a; --text-2:#334155; --text-3:#64748b; --text-4:#94a3b8;
    }
    [data-theme="dark"] {
      --bg-body:#0b0f1a; --bg-card:#111827; --bg-card2:#0f172a; --bg-input:#1e293b;
      --bg-step:#111827; --bg-pre:#0b0f1a; --border:#1e293b;
      --text-1:#f1f5f9; --text-2:#cbd5e1; --text-3:#64748b; --text-4:#475569;
    }
    body { background:var(--bg-body); color:var(--text-1); transition:background .2s,color .2s; }

    .scroller::-webkit-scrollbar { width:5px; }
    .scroller::-webkit-scrollbar-thumb { background:var(--text-4); border-radius:4px; }

    .card-panel { background:var(--bg-card); border:1px solid var(--border); border-radius:.75rem; overflow:hidden; transition:background .2s,border-color .2s; }
    .card-header { padding:.625rem 1rem; border-bottom:1px solid var(--border); display:flex; align-items:center; font-size:.8125rem; font-weight:600; color:var(--text-2); gap:.5rem; transition:border-color .2s; }

    /* ── 步骤 ── */
    .step-card { background:var(--bg-step); border:1px solid var(--border); border-radius:.625rem; padding:.75rem .875rem; font-size:.8125rem; line-height:1.6; color:var(--text-2); animation:fadeSlide .3s ease both; transition:background .2s,border-color .2s; }
    .step-card+.step-card { margin-top:.375rem; }
    @keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .step-card .label { display:inline-block; font-size:.625rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:.1rem .4rem; border-radius:.2rem; margin-bottom:.2rem; }
    .step-card.think .label  { background:#eef2ff;color:#4338ca; }
    .step-card.action .label { background:#e0f2fe;color:#0369a1; }
    .step-card.observe .label{ background:#ecfdf5;color:#047857; }
    [data-theme="dark"] .step-card.think .label  { background:#312e81;color:#a5b4fc; }
    [data-theme="dark"] .step-card.action .label { background:#1e3a5f;color:#7dd3fc; }
    [data-theme="dark"] .step-card.observe .label{ background:#064e3b;color:#6ee7b7; }
    .step-card pre { background:var(--bg-pre); padding:.4rem .6rem; border-radius:.3rem; overflow-x:auto; font-size:.7rem; margin-top:.3rem; }

    /* ── 诊断面板 ── */
    .diag-field { margin-bottom:.625rem; }
    .field-label { font-size:.625rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text-3); margin-bottom:.2rem; }
    .conf-bar { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
    .conf-fill { height:100%; border-radius:3px; transition:width .6s cubic-bezier(.4,0,.2,1); }

    /* ── 状态 ── */
    .badge-status { display:inline-flex; align-items:center; gap:.3rem; padding:.2rem .5rem; border-radius:999px; font-size:.625rem; font-weight:600; }
    .badge-status .dot { width:5px;height:5px;border-radius:50%; }
    .badge-status.pending  { background:#e2e8f0;color:#64748b; } .badge-status.pending .dot  { background:#64748b; }
    .badge-status.running  { background:#fef3c7;color:#b45309; } .badge-status.running .dot  { background:#f59e0b;animation:pdot 1.5s infinite; }
    .badge-status.completed{ background:#d1fae5;color:#047857; } .badge-status.completed .dot{ background:#10b981; }
    .badge-status.failed   { background:#fee2e2;color:#b91c1c; } .badge-status.failed .dot   { background:#ef4444; }
    [data-theme="dark"] .badge-status.pending  { background:#1e293b;color:#94a3b8; }
    [data-theme="dark"] .badge-status.running  { background:#422006;color:#fbbf24; }
    [data-theme="dark"] .badge-status.completed{ background:#052e16;color:#4ade80; }
    [data-theme="dark"] .badge-status.failed   { background:#450a0a;color:#f87171; }
    @keyframes pdot { 0%,100%{opacity:1}50%{opacity:.3} }

    .typing span { animation:blink 1.2s infinite both; }
    .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
    @keyframes blink { 0%,80%,100%{opacity:.2}40%{opacity:1} }

    .chip { display:inline-flex;align-items:center;border:1.5px solid var(--border);color:var(--text-3);border-radius:999px;padding:.3rem .75rem;font-size:.7rem;cursor:pointer;transition:all .15s;white-space:nowrap; }
    .chip:hover { border-color:var(--brand);color:var(--brand);background:rgba(99,102,241,.06); }

    .input-diag { background:var(--bg-input);border:1px solid var(--border);color:var(--text-1);transition:all .2s; }
    .input-diag::placeholder { color:var(--text-4); }
    .input-diag:focus { outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(99,102,241,.15); }

    .suggestion-item { display:flex;align-items:flex-start;gap:.4rem;padding:.4rem .5rem;background:var(--bg-card2);border-radius:.4rem;font-size:.75rem;color:var(--text-2); }
    .suggestion-item+.suggestion-item { margin-top:.3rem; }
    .suggestion-num { width:1.125rem;height:1.125rem;border-radius:50%;background:var(--brand);color:#fff;font-size:.5625rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.1rem; }

    .history-row { display:flex;align-items:center;gap:.625rem;padding:.5rem .625rem;border-radius:.4rem;cursor:pointer;transition:background .15s; }
    .history-row:hover { background:var(--bg-input); }

    .svc-tag { display:inline-block;padding:.1rem .4rem;border-radius:.2rem;font-size:.625rem;font-weight:600; }
    .svc-tag.affected { background:#fee2e2;color:#b91c1c; }
    [data-theme="dark"] .svc-tag.affected { background:#7f1d1d;color:#fca5a5; }

    .theme-btn { width:1.75rem;height:1.75rem;border-radius:.375rem;border:1px solid var(--border);background:var(--bg-card);color:var(--text-3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s; }
    .theme-btn:hover { border-color:var(--brand);color:var(--brand); }

    /* ── Tab 切换 ── */
    .tab-btn { padding:.375rem .75rem;border-radius:.375rem;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text-3);background:transparent; }
    .tab-btn:hover { color:var(--text-1); }
    .tab-btn.active { background:var(--brand);color:#fff; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    /* ── 拓扑节点 ── */
    .topo-node {
      display:flex;flex-direction:column;align-items:center;gap:.25rem;
      padding:.5rem .75rem;border-radius:.5rem;border:2px solid var(--border);
      background:var(--bg-card2);min-width:100px;text-align:center;
      transition:all .3s;position:relative;
    }
    .topo-node .node-name { font-size:.6875rem;font-weight:600;color:var(--text-2); }
    .topo-node .node-info { font-size:.5625rem;color:var(--text-4); }
    .topo-node .node-dot { width:8px;height:8px;border-radius:50%;position:absolute;top:-.25rem;right:-.25rem; }
    .topo-node.ok    { border-color:#10b981; } .topo-node.ok .node-dot    { background:#10b981; }
    .topo-node.error { border-color:#ef4444;background:rgba(239,68,68,.06); } .topo-node.error .node-dot { background:#ef4444;animation:pdot 1s infinite; }
    .topo-node.warn  { border-color:#f59e0b; } .topo-node.warn .node-dot  { background:#f59e0b; }
    .topo-node.idle  { border-color:var(--border); } .topo-node.idle .node-dot { background:var(--text-4); }
    [data-theme="dark"] .topo-node.error { background:rgba(239,68,68,.08); }

    .topo-arrow { color:var(--text-4);font-size:.75rem;display:flex;align-items:center; }
    .topo-arrow.error { color:#ef4444;font-weight:700; }

    /* ── 时间线 ── */
    .timeline-item { display:flex;gap:.75rem;padding:.375rem 0;font-size:.75rem; }
    .timeline-dot { width:.5rem;height:.5rem;border-radius:50%;flex-shrink:0;margin-top:.3rem; }
    .timeline-dot.error { background:#ef4444; } .timeline-dot.warn { background:#f59e0b; }
    .timeline-dot.info  { background:#3b82f6; } .timeline-dot.ok   { background:#10b981; }

    /* ── 统计卡 ── */
    .stat-card { background:var(--bg-card2);border:1px solid var(--border);border-radius:.5rem;padding:.625rem .75rem;transition:all .2s; }
    .stat-val { font-size:1.25rem;font-weight:700;color:var(--text-1); }
    .stat-label { font-size:.625rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.03em; }

    /* ── 复制按钮 ── */
    .copy-btn { padding:.2rem .5rem;border-radius:.25rem;font-size:.625rem;border:1px solid var(--border);color:var(--text-3);cursor:pointer;transition:all .15s; }
    .copy-btn:hover { border-color:var(--brand);color:var(--brand); }

    /* ── 回放相关 ── */
    .mode-tab { padding:.375rem .875rem;border-radius:.375rem;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text-3);background:transparent;border:1px solid var(--border); }
    .mode-tab:hover { color:var(--text-1);border-color:var(--text-3); }
    .mode-tab.active { background:var(--brand);color:#fff;border-color:var(--brand); }

    .blast-badge { display:inline-flex;align-items:center;padding:.25rem .75rem;border-radius:999px;font-size:.6875rem;font-weight:700;letter-spacing:.05em; }
    .blast-badge.low { background:#d1fae5;color:#047857; }
    .blast-badge.medium { background:#fef3c7;color:#b45309; }
    .blast-badge.high { background:#fee2e2;color:#b91c1c; }
    .blast-badge.critical { background:#7f1d1d;color:#fca5a5;animation:pdot 1s infinite; }
    [data-theme="dark"] .blast-badge.low { background:#052e16;color:#4ade80; }
    [data-theme="dark"] .blast-badge.medium { background:#422006;color:#fbbf24; }
    [data-theme="dark"] .blast-badge.high { background:#450a0a;color:#f87171; }

    .impact-topo-node {
      display:flex;flex-direction:column;align-items:center;gap:.2rem;
      padding:.5rem .625rem;border-radius:.5rem;border:2px solid var(--border);
      background:var(--bg-card2);min-width:110px;text-align:center;
      transition:all .3s;position:relative;
    }
    .impact-topo-node .node-name { font-size:.6875rem;font-weight:600;color:var(--text-2); }
    .impact-topo-node .node-metrics { font-size:.5625rem;color:var(--text-4);line-height:1.4; }
    .impact-topo-node .node-dot { width:8px;height:8px;border-radius:50%;position:absolute;top:-.25rem;right:-.25rem; }
    .impact-topo-node.healthy { border-color:#10b981; } .impact-topo-node.healthy .node-dot { background:#10b981; }
    .impact-topo-node.degraded { border-color:#f59e0b;background:rgba(245,158,11,.06); } .impact-topo-node.degraded .node-dot { background:#f59e0b;animation:pdot 1.5s infinite; }
    .impact-topo-node.down { border-color:#ef4444;background:rgba(239,68,68,.08); } .impact-topo-node.down .node-dot { background:#ef4444;animation:pdot 1s infinite; }
    [data-theme="dark"] .impact-topo-node.degraded { background:rgba(245,158,11,.08); }
    [data-theme="dark"] .impact-topo-node.down { background:rgba(239,68,68,.1); }

    .slider-container { display:flex;align-items:center;gap:.5rem; }
    .slider-container input[type="range"] { flex:1;height:4px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none; }
    .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--brand);cursor:pointer; }

    .toggle-switch { position:relative;width:36px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;transition:background .2s; }
    .toggle-switch.on { background:var(--brand); }
    .toggle-switch .toggle-knob { position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s; }
    .toggle-switch.on .toggle-knob { transform:translateX(16px); }
  </style>
</head>
<body class="min-h-screen">

  <!-- ═══ 顶栏 ═══ -->
  <header class="border-b sticky top-0 z-30 backdrop-blur" style="border-color:var(--border);background:color-mix(in srgb,var(--bg-card) 85%,transparent)">
    <div class="max-w-[1400px] mx-auto px-5 h-12 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-7 h-7 rounded-md flex items-center justify-center text-white font-bold text-xs" style="background:linear-gradient(135deg,var(--brand),#a78bfa)">A</div>
        <div class="flex flex-col leading-tight">
          <span class="font-bold text-sm" style="color:var(--text-1)">Argus</span>
          <span class="text-[9px]" style="color:var(--text-4)">UCloud 智能日志诊断与故障恢复</span>
        </div>
      </div>
      <div class="flex items-center gap-2.5">
        <!-- 演示模式 Toggle -->
        <div class="flex items-center gap-1.5">
          <span class="text-[10px] font-medium" style="color:var(--text-3)">演示</span>
          <div id="demo-toggle" class="toggle-switch" onclick="toggleDemoMode()"><div class="toggle-knob"></div></div>
        </div>
        <span id="task-timer" class="text-xs" style="color:var(--text-4);display:none"></span>
        <span id="task-badge" class="badge-status pending" style="display:none"><span class="dot"></span><span id="task-badge-text"></span></span>
        <button class="theme-btn" onclick="toggleTheme()" title="切换主题">
          <svg id="icon-sun" class="w-3.5 h-3.5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="icon-moon" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-[1400px] mx-auto px-5 py-5">

    <!-- 模式切换 + 输入区 -->
    <div class="card-panel p-4 mb-5">
      <!-- 模式 Tab -->
      <div class="flex gap-2 mb-3">
        <button class="mode-tab active" id="mode-diagnose-tab" onclick="switchMode('diagnose')">诊断模式</button>
        <button class="mode-tab" id="mode-replay-tab" onclick="switchMode('replay')">回放模式</button>
        <button class="mode-tab" id="mode-monitor-tab" onclick="switchMode('monitor')">监控模式</button>
      </div>

      <!-- 诊断模式输入 -->
      <div id="diagnose-input-panel">
        <div class="flex gap-3">
          <input id="diag-input" type="text" placeholder="输入告警描述、request_uuid 或错误关键词，如：prj-ubill 连接池耗尽" class="input-diag flex-1 rounded-lg px-4 py-2 text-sm" />
          <button id="diag-btn" onclick="startDiagnose()" class="shrink-0 px-5 py-2 rounded-lg text-white text-sm font-semibold transition-all hover:brightness-110 active:scale-[.97] disabled:opacity-40 disabled:pointer-events-none" style="background:linear-gradient(135deg,var(--brand),#818cf8)">开始诊断</button>
        </div>
        <div class="flex flex-wrap gap-1.5 mt-2.5">
          <span class="chip" onclick="quickFill(this)">prj-ubill 连接池耗尽</span>
          <span class="chip" onclick="quickFill(this)">prj-uresource 大量 504 超时</span>
          <span class="chip" onclick="quickFill(this)">prj-apigateway 间歇性 502</span>
          <span class="chip" onclick="quickFill(this)">prj-uresource OOM</span>
        </div>
      </div>

      <!-- 回放模式输入 -->
      <div id="replay-input-panel" style="display:none">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- 左：场景选择 + 类型 -->
          <div class="flex flex-col gap-3">
            <div>
              <label class="field-label mb-1 block">故障场景</label>
              <select id="replay-scenario" class="input-diag w-full rounded-lg px-3 py-2 text-sm">
                <option value="">加载中...</option>
              </select>
            </div>
            <div>
              <label class="field-label mb-1 block">回放类型</label>
              <div class="flex gap-2">
                <button class="mode-tab active text-xs" id="replay-type-fault" onclick="setReplayType('fault')">故障回放</button>
                <button class="mode-tab text-xs" id="replay-type-traffic" onclick="setReplayType('traffic')">流量回放</button>
              </div>
            </div>
          </div>
          <!-- 右：参数配置 -->
          <div class="flex flex-col gap-3">
            <div>
              <label class="field-label mb-1 block">故障强度 <span id="intensity-val" class="text-xs font-mono" style="color:var(--text-2)">1.0</span></label>
              <div class="slider-container">
                <span class="text-xs" style="color:var(--text-4)">0.1</span>
                <input type="range" id="replay-intensity" min="0.1" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('intensity-val').textContent=this.value" />
                <span class="text-xs" style="color:var(--text-4)">2.0</span>
              </div>
            </div>
            <div id="traffic-rate-group" style="display:none">
              <label class="field-label mb-1 block">流量倍率 <span id="rate-val" class="text-xs font-mono" style="color:var(--text-2)">1.0</span></label>
              <div class="slider-container">
                <span class="text-xs" style="color:var(--text-4)">0.5</span>
                <input type="range" id="replay-rate" min="0.5" max="5.0" step="0.5" value="1.0" oninput="document.getElementById('rate-val').textContent=this.value" />
                <span class="text-xs" style="color:var(--text-4)">5.0</span>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <label class="field-label">自动诊断</label>
              <div id="replay-autodiag" class="toggle-switch on" onclick="toggleAutodiag()">
                <div class="toggle-knob"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="mt-3 flex justify-end">
          <button id="replay-btn" onclick="startReplay()" class="px-5 py-2 rounded-lg text-white text-sm font-semibold transition-all hover:brightness-110 active:scale-[.97] disabled:opacity-40 disabled:pointer-events-none" style="background:linear-gradient(135deg,#06b6d4,#3b82f6)">开始回放</button>
        </div>
      </div>
    </div>

    <!-- 统计栏 -->
    <div id="stats-bar" class="grid grid-cols-4 gap-3 mb-5" style="display:none">
      <div class="stat-card"><div id="stat-steps" class="stat-val">0</div><div class="stat-label">推理步骤</div></div>
      <div class="stat-card"><div id="stat-tools" class="stat-val">0</div><div class="stat-label">工具调用</div></div>
      <div class="stat-card"><div id="stat-conf" class="stat-val">—</div><div class="stat-label">置信度</div></div>
      <div class="stat-card"><div id="stat-time" class="stat-val">—</div><div class="stat-label">耗时</div></div>
    </div>

    <!-- 三栏 -->
    <div id="main-grid" class="grid grid-cols-1 lg:grid-cols-12 gap-5">

      <!-- 左栏：推理过程（5/12） -->
      <div class="lg:col-span-5 card-panel flex flex-col" style="min-height:400px;max-height:75vh">
        <div class="card-header justify-between">
          <div class="flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            AI 推理过程
          </div>
          <span id="step-count" class="text-xs" style="color:var(--text-4)"></span>
        </div>
        <div id="steps-panel" class="flex-1 overflow-y-auto scroller p-3">
          <div class="text-center text-sm py-16" style="color:var(--text-4)">输入告警描述，开始诊断</div>
        </div>
      </div>

      <!-- 中栏：拓扑 + 结论（4/12） -->
      <div class="lg:col-span-4 flex flex-col gap-5">

        <!-- 调用链拓扑 -->
        <div class="card-panel">
          <div class="card-header gap-1.5">
            <svg class="w-3.5 h-3.5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            调用链路
          </div>
          <div id="topo-panel" class="p-4">
            <div id="topo-placeholder" class="text-center text-xs py-6" style="color:var(--text-4)">诊断后展示故障链路拓扑</div>
            <div id="topo-graph" style="display:none"></div>
          </div>
        </div>

        <!-- 诊断结论 -->
        <div class="card-panel flex flex-col">
          <div class="card-header justify-between">
            <div class="flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              诊断结论
            </div>
            <button id="copy-btn" class="copy-btn" style="display:none" onclick="copyDiagnosis()">复制报告</button>
          </div>
          <div id="diagnosis-panel" class="p-4 overflow-y-auto scroller" style="max-height:40vh">
            <div class="text-center text-sm py-8" style="color:var(--text-4)">等待诊断完成</div>
          </div>
        </div>

        <!-- 影响面报告 -->
        <div id="impact-report-panel" class="card-panel" style="display:none">
          <div class="card-header gap-1.5">
            <svg class="w-3.5 h-3.5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            影响面报告
            <span id="blast-badge" class="blast-badge low ml-auto" style="display:none">LOW</span>
          </div>
          <div id="impact-report-content" class="p-4 overflow-y-auto scroller" style="max-height:35vh">
          </div>
        </div>
      </div>

      <!-- 右栏：时间线 + 历史（3/12） -->
      <div class="lg:col-span-3 flex flex-col gap-5">

        <!-- 事件时间线 -->
        <div class="card-panel flex flex-col">
          <div class="card-header gap-1.5">
            <svg class="w-3.5 h-3.5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"/></svg>
            事件时间线
          </div>
          <div id="timeline-panel" class="p-3 overflow-y-auto scroller" style="max-height:30vh">
            <div class="text-center text-xs py-6" style="color:var(--text-4)">暂无事件</div>
          </div>
        </div>

        <!-- 历史 -->
        <div class="card-panel">
          <div class="card-header gap-1.5">
            <svg class="w-3.5 h-3.5" style="color:var(--text-4)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            最近诊断
          </div>
          <div id="history-panel" class="p-2.5 max-h-44 overflow-y-auto scroller">
            <div class="text-center text-xs py-4" style="color:var(--text-4)">暂无记录</div>
          </div>
        </div>
      </div>
    </div>
    <!-- 监控模式面板 -->
    <div id="monitor-panel" style="display:none">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
        <div class="lg:col-span-2 card-panel">
          <div class="card-header">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            监控状态
          </div>
          <div class="p-4">
            <div id="monitor-status" class="text-sm" style="color:var(--text-2)">
              <div class="flex items-center gap-2 mb-2">
                <span class="dot" style="width:8px;height:8px;border-radius:50%;background:#10b981"></span>
                <span>日志监控服务运行中</span>
              </div>
              <div class="text-xs" style="color:var(--text-3)">每 30 秒扫描一次 ES，检测 ERROR 日志异常</div>
            </div>
          </div>
        </div>
        <div class="card-panel">
          <div class="card-header">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            Live 生成器
          </div>
          <div class="p-4 flex flex-col gap-2">
            <div id="live-status" class="text-xs" style="color:var(--text-3)">状态: 已停止</div>
            <button id="live-toggle-btn" onclick="toggleLiveGen()" class="px-3 py-1.5 rounded-md text-xs font-semibold text-white transition-all hover:brightness-110" style="background:var(--brand)">启动 Live</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部日志终端面板 -->
    <div id="live-log-panel" class="card-panel mt-4" style="display:none">
      <div class="card-header justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          实时日志流
          <span id="log-count" class="text-[10px] px-1.5 py-0.5 rounded" style="background:var(--bg-input);color:var(--text-4)">0</span>
        </div>
        <button onclick="clearLogPanel()" class="text-[10px] px-2 py-0.5 rounded" style="border:1px solid var(--border);color:var(--text-3)">清空</button>
      </div>
      <div id="log-terminal" class="scroller" style="height:12rem;overflow-y:auto;background:rgba(0,0,0,0.8);padding:.5rem .75rem;font-family:ui-monospace,SFMono-Regular,monospace;font-size:11px;line-height:1.6">
      </div>
    </div>
  </main>

  <script>
    marked.setOptions({breaks:true,gfm:true});

    /* ── 主题 ── */
    function getTheme(){return localStorage.getItem('argus-theme')||'dark'}
    function applyTheme(t){document.documentElement.setAttribute('data-theme',t);document.getElementById('icon-sun').classList.toggle('hidden',t==='dark');document.getElementById('icon-moon').classList.toggle('hidden',t==='light');localStorage.setItem('argus-theme',t)}
    function toggleTheme(){applyTheme(getTheme()==='dark'?'light':'dark')}
    applyTheme(getTheme());

    /* ── 状态 ── */
    const API_KEY='argus-demo-key';
    let currentTaskID=null, eventSource=null, stepIndex=0, toolCount=0, diagStart=0, timerInterval=null;
    let currentDiagnosis=null, traceData=[], timelineEvents=[];
    const diagHistory=[];

    /* 服务拓扑定义（UCloud namespace 格式） */
    const TOPOLOGY = {
      services: ['prj-apigateway','prj-ubill','prj-uresource','prj-uhost','prj-unet','prj-udb'],
      edges: [
        ['prj-apigateway','prj-ubill'],['prj-apigateway','prj-uresource'],['prj-apigateway','prj-uhost'],
        ['prj-ubill','prj-uresource'],['prj-uresource','prj-unet'],
      ],
      /* 用于展示主要诊断链路的路径 */
      chains: {
        'prj-ubill':      ['prj-apigateway','prj-ubill'],
        'prj-uresource':  ['prj-apigateway','prj-uresource'],
        'prj-uhost':      ['prj-apigateway','prj-uhost'],
        'prj-unet':       ['prj-apigateway','prj-uresource','prj-unet'],
        'prj-udb':        ['prj-apigateway','prj-ubill','prj-udb'],
        'prj-apigateway': ['prj-apigateway'],
      }
    };

    function quickFill(el){document.getElementById('diag-input').value=el.textContent.trim();document.getElementById('diag-input').focus()}

    /* ── 触发诊断 ── */
    async function startDiagnose(){
      const input=document.getElementById('diag-input').value.trim();
      if(!input) return;
      const btn=document.getElementById('diag-btn');
      btn.disabled=true; btn.textContent='诊断中…';

      stepIndex=0; toolCount=0; traceData=[]; timelineEvents=[]; currentDiagnosis=null;
      document.getElementById('steps-panel').innerHTML='';
      document.getElementById('step-count').textContent='';
      document.getElementById('diagnosis-panel').innerHTML='<div class="flex items-center justify-center gap-2 text-sm py-8" style="color:var(--text-4)"><span class="typing"><span>●</span><span>●</span><span>●</span></span> Agent 推理中</div>';
      document.getElementById('copy-btn').style.display='none';
      resetTopo(); resetTimeline();

      /* 统计栏 */
      document.getElementById('stats-bar').style.display='grid';
      document.getElementById('stat-steps').textContent='0';
      document.getElementById('stat-tools').textContent='0';
      document.getElementById('stat-conf').textContent='…';
      document.getElementById('stat-time').textContent='0s';
      diagStart=Date.now();
      if(timerInterval) clearInterval(timerInterval);
      timerInterval=setInterval(()=>{document.getElementById('stat-time').textContent=Math.round((Date.now()-diagStart)/1000)+'s'},500);

      updateBadge('running');
      addTimeline('info','开始诊断: '+input);

      try{
        const res=await fetch('/api/v1/diagnose',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},body:JSON.stringify({input,source:'web'})});
        const data=await res.json();
        currentTaskID=data.task_id;
        connectSSE(currentTaskID);
        pollResult(currentTaskID);
      }catch(e){
        btn.disabled=false;btn.textContent='开始诊断';updateBadge('failed');
        addTimeline('error','请求失败: '+e.message);
      }
    }

    /* ── SSE ── */
    function connectSSE(taskID){
      if(eventSource) eventSource.close();
      eventSource=new EventSource('/api/v1/stream/'+taskID);
      eventSource.addEventListener('step',e=>{renderStep(JSON.parse(e.data).data)});
      eventSource.addEventListener('diagnosis',e=>{handleDiagnosis(JSON.parse(e.data).data)});
      eventSource.addEventListener('status',e=>{
        const s=JSON.parse(e.data).data;
        const st=typeof s==='string'?s:String(s);
        updateBadge(st);
        if(['completed','failed','recovered'].includes(st)) finish(st);
      });
      eventSource.onerror=()=>{};
    }

    /* ── 轮询 ── */
    function pollResult(taskID){
      const timer=setInterval(async()=>{
        try{
          const res=await fetch('/api/v1/tasks/'+taskID,{headers:{'Authorization':'Bearer '+API_KEY}});
          if(!res.ok) return;
          const task=await res.json();
          if(['completed','failed','recovered'].includes(task.status)){
            clearInterval(timer);
            if(task.diagnosis) handleDiagnosis(task.diagnosis);
            const panel=document.getElementById('steps-panel');
            if(panel.children.length===0 && task.steps) task.steps.forEach(s=>renderStep(s));
            updateBadge(task.status);
            finish(task.status);
            addHistory(task);
          }
        }catch{}
      },3000);
    }

    function finish(status){
      if(eventSource){eventSource.close();eventSource=null}
      if(timerInterval){clearInterval(timerInterval);timerInterval=null}
      document.getElementById('diag-btn').disabled=false;
      document.getElementById('diag-btn').textContent='开始诊断';
      addTimeline(status==='completed'?'ok':'error','诊断完成: '+status);
    }

    /* ── 渲染步骤 ── */
    function renderStep(step){
      const panel=document.getElementById('steps-panel');
      if(stepIndex===0) panel.innerHTML='';

      if(step.think){
        const c=document.createElement('div');c.className='step-card think';
        c.innerHTML='<span class="label">Think</span><div>'+escHtml(truncate(step.think,400))+'</div>';
        panel.appendChild(c);
      }
      if(step.action){
        toolCount++;
        const c=document.createElement('div');c.className='step-card action';
        c.innerHTML='<span class="label">Action · '+escHtml(step.action.tool)+'</span><pre>'+escHtml(JSON.stringify(step.action.params||{}))+'</pre>';
        panel.appendChild(c);
        document.getElementById('stat-tools').textContent=toolCount;
        addTimeline('info','调用 '+step.action.tool);

        /* 从 action 中提取 trace 和服务信息 */
        extractTraceInfo(step);
      }
      if(step.observe){
        const c=document.createElement('div');c.className='step-card observe';
        c.innerHTML='<span class="label">Observe</span><pre>'+escHtml(truncate(step.observe,500))+'</pre>';
        panel.appendChild(c);

        /* 从 observe 提取关键事件 */
        extractObserveEvents(step.observe);
      }

      stepIndex++;
      document.getElementById('step-count').textContent='Step '+stepIndex;
      document.getElementById('stat-steps').textContent=stepIndex;
      panel.scrollTop=panel.scrollHeight;
    }

    /* ── 提取链路信息 ── */
    function extractTraceInfo(step){
      if(!step.action) return;
      const p=step.action.params||{};
      if(step.action.tool==='trace_analyze'){
        /* 新格式：request_uuid；兼容旧格式：trace_id */
        const id=p.request_uuid||p.trace_id;
        if(id) addTimeline('info','追踪链路 '+id.substring(0,12)+'…');
      }
      if(step.action.tool==='es_query_logs'){
        if(p.namespace) addTimeline('info','查询 namespace: '+p.namespace);
        if(p.request_uuid) addTimeline('info','追踪 request_uuid: '+p.request_uuid.substring(0,12)+'…');
      }
    }

    function extractObserveEvents(obs){
      /* per-step 去重：同一 observe 内相同事件只添加一次 */
      const seen = new Set();
      function addOnce(type, msg){
        const key = type + '|' + msg;
        if(seen.has(key)) return;
        seen.add(key);
        addTimeline(type, msg);
      }
      /* 连接与资源类 */
      if(obs.includes('pool exhausted')) addOnce('error','检测到连接池耗尽');
      if(obs.includes('OOM') || obs.includes('out of memory')) addOnce('error','检测到 OOM');
      if(obs.includes('no space left') || obs.includes('disk')) addOnce('error','检测到磁盘空间不足');
      if(obs.includes('timeout') || obs.includes('TIMEOUT')) addOnce('warn','检测到超时');
      if(obs.includes('connection refused')) addOnce('warn','检测到连接拒绝');
      if(obs.includes('slow query')) addOnce('warn','检测到慢查询');
      /* UCloud 链路追踪类 */
      if(obs.includes('request_uuid')) addOnce('info','检测到 request_uuid 追踪标识');
      if(obs.includes('trace-line') || obs.includes('Trace Line')) addOnce('info','检测到网关链路 trace-line');
      if(obs.includes('trace_analyze')) addOnce('info','执行链路分析');
      /* Namespace / K8s 类 */
      if(obs.includes('namespace') || obs.includes('kubernetes_namespace')) addOnce('info','检测到 namespace 信息');
      if(obs.includes('prj-apigateway')) addOnce('warn','网关 prj-apigateway 异常');
      if(obs.includes('prj-ubill')) addOnce('warn','计费服务 prj-ubill 异常');
      if(obs.includes('prj-uresource')) addOnce('warn','资源服务 prj-uresource 异常');
      /* 错误级别 */
      if(obs.includes('ERROR')) addOnce('error','检测到 ERROR 级别日志');
    }

    /* ── 处理诊断结果 ── */
    function handleDiagnosis(d){
      if(!d||!d.root_cause) return;
      currentDiagnosis=d;
      renderDiagnosis(d);
      renderTopo(d);
      document.getElementById('copy-btn').style.display='inline';
      document.getElementById('stat-conf').textContent=Math.round((d.confidence||0)*100)+'%';
      addTimeline('ok','根因: '+truncate(d.root_cause,60));
    }

    function renderDiagnosis(d){
      const panel=document.getElementById('diagnosis-panel');
      const conf=Math.round((d.confidence||0)*100);
      const confColor=conf>=80?'#10b981':conf>=50?'#f59e0b':'#ef4444';
      const svcs=(d.affected_services||[]).map(s=>'<span class="svc-tag affected">'+escHtml(s)+'</span>').join(' ');
      const suggs=(d.suggestions||[]).map((s,i)=>'<div class="suggestion-item"><span class="suggestion-num">'+(i+1)+'</span><span>'+escHtml(s)+'</span></div>').join('');

      panel.innerHTML=`
        <div class="diag-field"><div class="field-label">根因</div><div class="text-sm leading-relaxed" style="color:var(--text-2)">${escHtml(d.root_cause)}</div></div>
        <div class="diag-field"><div class="field-label">置信度</div><div class="flex items-center gap-2 mt-1"><div class="conf-bar flex-1"><div class="conf-fill" style="width:${conf}%;background:${confColor}"></div></div><span class="text-sm font-bold" style="color:${confColor}">${conf}%</span></div></div>
        <div class="diag-field"><div class="field-label">影响服务</div><div class="flex flex-wrap gap-1 mt-1">${svcs||'—'}</div></div>
        <div class="diag-field"><div class="field-label">影响范围</div><div class="text-xs" style="color:var(--text-3)">${escHtml(d.impact||'—')}</div></div>
        <div><div class="field-label">恢复建议</div>${suggs||'—'}</div>`;
    }

    /* ── 拓扑渲染 ── */
    function resetTopo(){
      document.getElementById('topo-placeholder').style.display='block';
      document.getElementById('topo-graph').style.display='none';
      document.getElementById('topo-graph').innerHTML='';
    }

    function renderTopo(d){
      if(!d||!d.affected_services||d.affected_services.length===0) return;
      document.getElementById('topo-placeholder').style.display='none';
      const g=document.getElementById('topo-graph');
      g.style.display='flex';
      g.innerHTML='';
      g.style.flexDirection='column';
      g.style.gap='.75rem';

      const affected=new Set(d.affected_services.map(s=>s.toLowerCase()));

      /* 找到主链路 */
      let chain=null;
      for(const svc of d.affected_services){
        const c=TOPOLOGY.chains[svc];
        if(c && (!chain || c.length>chain.length)) chain=c;
      }
      if(!chain) chain=['gateway','order-service',...d.affected_services.filter(s=>s!=='gateway'&&s!=='order-service')];

      /* 主链路 */
      const mainRow=document.createElement('div');
      mainRow.style.cssText='display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap';
      chain.forEach((svc,i)=>{
        if(i>0){
          const arrow=document.createElement('div');
          arrow.className='topo-arrow'+(affected.has(svc)?' error':'');
          arrow.textContent='→';
          mainRow.appendChild(arrow);
        }
        const node=document.createElement('div');
        node.className='topo-node '+(affected.has(svc)?'error':'ok');
        node.innerHTML=`<span class="node-dot"></span><span class="node-name">${escHtml(svc)}</span><span class="node-info">${affected.has(svc)?'异常':'正常'}</span>`;
        mainRow.appendChild(node);
      });
      g.appendChild(mainRow);

      /* 其他受影响但不在主链路中的服务 */
      const others=d.affected_services.filter(s=>!chain.includes(s));
      if(others.length>0){
        const otherRow=document.createElement('div');
        otherRow.style.cssText='display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap;padding-top:.25rem';
        others.forEach(svc=>{
          const node=document.createElement('div');
          node.className='topo-node error';
          node.innerHTML=`<span class="node-dot"></span><span class="node-name">${escHtml(svc)}</span><span class="node-info">异常</span>`;
          otherRow.appendChild(node);
        });
        g.appendChild(otherRow);
      }

      /* 不受影响的服务 */
      const unaffected=TOPOLOGY.services.filter(s=>!affected.has(s)&&!chain.includes(s));
      if(unaffected.length>0){
        const label=document.createElement('div');
        label.style.cssText='font-size:.5625rem;color:var(--text-4);text-align:center;padding-top:.25rem';
        label.textContent='其他服务';
        g.appendChild(label);
        const row=document.createElement('div');
        row.style.cssText='display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap';
        unaffected.forEach(svc=>{
          const node=document.createElement('div');
          node.className='topo-node ok';
          node.style.minWidth='80px';
          node.innerHTML=`<span class="node-dot"></span><span class="node-name">${escHtml(svc)}</span><span class="node-info">正常</span>`;
          row.appendChild(node);
        });
        g.appendChild(row);
      }
    }

    /* ── 时间线 ── */
    function resetTimeline(){timelineEvents=[];document.getElementById('timeline-panel').innerHTML='<div class="text-center text-xs py-6" style="color:var(--text-4)">暂无事件</div>'}

    function addTimeline(level,text){
      timelineEvents.push({level,text,time:new Date()});
      const panel=document.getElementById('timeline-panel');
      if(timelineEvents.length===1) panel.innerHTML='';
      const item=document.createElement('div');
      item.className='timeline-item';
      item.style.animation='fadeSlide .2s ease both';
      const t=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      item.innerHTML=`<span class="timeline-dot ${level}"></span><span class="flex-1" style="color:var(--text-2)">${escHtml(text)}</span><span style="color:var(--text-4);font-size:.625rem;flex-shrink:0">${t}</span>`;
      panel.appendChild(item);
      panel.scrollTop=panel.scrollHeight;
    }

    /* ── 状态 ── */
    function updateBadge(status){
      const b=document.getElementById('task-badge'),t=document.getElementById('task-badge-text');
      b.style.display='inline-flex';
      b.className='badge-status '+status;
      t.textContent={pending:'PENDING',running:'RUNNING',completed:'COMPLETED',failed:'FAILED',recovered:'RECOVERED'}[status]||status.toUpperCase();
    }

    /* ── 复制诊断报告 ── */
    function copyDiagnosis(){
      if(!currentDiagnosis) return;
      const d=currentDiagnosis;
      const text=`【Argus 诊断报告】\n根因: ${d.root_cause}\n置信度: ${Math.round(d.confidence*100)}%\n影响服务: ${(d.affected_services||[]).join(', ')}\n影响范围: ${d.impact||'—'}\n恢复建议:\n${(d.suggestions||[]).map((s,i)=>(i+1)+'. '+s).join('\n')}`;
      navigator.clipboard.writeText(text).then(()=>{
        const btn=document.getElementById('copy-btn');
        btn.textContent='已复制';setTimeout(()=>{btn.textContent='复制报告'},1500);
      });
    }

    /* ── 历史 ── */
    function addHistory(task){diagHistory.unshift(task);if(diagHistory.length>10)diagHistory.pop();renderHistory()}
    function renderHistory(){
      const p=document.getElementById('history-panel');
      if(!diagHistory.length) return;
      p.innerHTML=diagHistory.map(t=>{
        const time=new Date(t.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
        const cls=t.status==='completed'?'color:#10b981':t.status==='failed'?'color:#ef4444':'color:var(--text-4)';
        const conf=t.diagnosis?Math.round(t.diagnosis.confidence*100)+'%':'—';
        return `<div class="history-row" onclick="replayTask('${escAttr(t.id)}')"><span class="text-xs shrink-0 w-10" style="color:var(--text-4)">${time}</span><span class="text-xs flex-1 truncate" style="color:var(--text-2)">${escHtml(t.input)}</span><span class="text-xs shrink-0" style="${cls}">${conf}</span></div>`;
      }).join('');
    }
    async function replayTask(taskID){
      try{
        const res=await fetch('/api/v1/tasks/'+taskID,{headers:{'Authorization':'Bearer '+API_KEY}});
        if(!res.ok) return;
        const task=await res.json();
        stepIndex=0;toolCount=0;
        document.getElementById('steps-panel').innerHTML='';
        document.getElementById('stats-bar').style.display='grid';
        (task.steps||[]).forEach(s=>renderStep(s));
        if(task.diagnosis) handleDiagnosis(task.diagnosis);
        updateBadge(task.status);
        document.getElementById('stat-time').textContent='—';
      }catch{}
    }

    /* ── 工具 ── */
    function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    function escAttr(s){return escHtml(s)}
    function truncate(s,n){return s.length<=n?s:s.slice(0,n)+'…'}

    document.getElementById('diag-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();startDiagnose()}});

    /* ═══════════ 回放模式 ═══════════ */

    let currentMode='diagnose';
    let replayType='fault';
    let replayAutodiag=true;
    let replaySessionID=null;
    let replayEventSource=null;

    function switchMode(mode){
      currentMode=mode;
      // 切换 tab 按钮高亮
      document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));
      const tabBtn = document.getElementById('mode-'+mode+'-tab');
      if(tabBtn) tabBtn.classList.add('active');

      // 切换面板显示
      document.getElementById('diagnose-input-panel').style.display = mode==='diagnose'?'':'none';
      document.getElementById('replay-input-panel').style.display = mode==='replay'?'':'none';
      const monitorPanel = document.getElementById('monitor-panel');
      if(monitorPanel) monitorPanel.style.display = mode==='monitor'?'':'none';

      // 三栏区域和统计栏仅在诊断和回放模式显示
      const mainGrid = document.getElementById('main-grid');
      if(mainGrid) mainGrid.style.display = mode==='monitor'?'none':'';
      const statsBar = document.getElementById('stats-bar');
      if(statsBar && mode==='monitor') statsBar.style.display = 'none';

      if(mode==='replay') fetchScenarios();
    }

    function setReplayType(type){
      replayType=type;
      document.getElementById('replay-type-fault').classList.toggle('active',type==='fault');
      document.getElementById('replay-type-traffic').classList.toggle('active',type==='traffic');
      document.getElementById('traffic-rate-group').style.display=type==='traffic'?'block':'none';
    }

    function toggleAutodiag(){
      replayAutodiag=!replayAutodiag;
      const el=document.getElementById('replay-autodiag');
      el.classList.toggle('on',replayAutodiag);
    }

    async function fetchScenarios(){
      try{
        const res=await fetch('/api/v1/scenarios',{headers:{'Authorization':'Bearer '+API_KEY}});
        const data=await res.json();
        const sel=document.getElementById('replay-scenario');
        sel.innerHTML=data.map(s=>`<option value="${escAttr(s.name)}">${escHtml(s.name)} — ${escHtml(s.description)}</option>`).join('');
      }catch(e){
        console.error('fetchScenarios failed:',e);
      }
    }

    async function startReplay(){
      const scenario=document.getElementById('replay-scenario').value;
      if(!scenario) return;

      const btn=document.getElementById('replay-btn');
      btn.disabled=true;btn.textContent='回放中…';

      const intensity=parseFloat(document.getElementById('replay-intensity').value);
      const rate=parseFloat(document.getElementById('replay-rate').value);

      // 重置 UI
      stepIndex=0;toolCount=0;traceData=[];timelineEvents=[];currentDiagnosis=null;
      document.getElementById('steps-panel').innerHTML='<div class="flex items-center justify-center gap-2 text-sm py-8" style="color:var(--text-4)"><span class="typing"><span>●</span><span>●</span><span>●</span></span> 回放进行中</div>';
      document.getElementById('diagnosis-panel').innerHTML='<div class="text-center text-sm py-8" style="color:var(--text-4)">等待回放完成</div>';
      document.getElementById('copy-btn').style.display='none';
      document.getElementById('impact-report-panel').style.display='none';
      resetTopo();resetTimeline();

      document.getElementById('stats-bar').style.display='grid';
      document.getElementById('stat-steps').textContent='0';
      document.getElementById('stat-tools').textContent='0';
      document.getElementById('stat-conf').textContent='…';
      document.getElementById('stat-time').textContent='0s';
      diagStart=Date.now();
      if(timerInterval) clearInterval(timerInterval);
      timerInterval=setInterval(()=>{document.getElementById('stat-time').textContent=Math.round((Date.now()-diagStart)/1000)+'s'},500);

      updateBadge('running');
      addTimeline('info',`开始${replayType==='fault'?'故障':'流量'}回放: ${scenario}`);

      try{
        const body={
          type:replayType,
          scenario:scenario,
          config:{
            fault_intensity:intensity,
            traffic_rate_multiplier:rate,
            auto_diagnose:replayAutodiag
          }
        };
        const res=await fetch('/api/v1/replay',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
          body:JSON.stringify(body)
        });
        const data=await res.json();
        replaySessionID=data.session_id;
        addTimeline('info','Session: '+replaySessionID.substring(0,8)+'…');
        connectReplaySSE(replaySessionID);
        pollReplayResult(replaySessionID);
      }catch(e){
        btn.disabled=false;btn.textContent='开始回放';
        updateBadge('failed');
        addTimeline('error','请求失败: '+e.message);
      }
    }

    function connectReplaySSE(sessionID){
      if(replayEventSource) replayEventSource.close();
      replayEventSource=new EventSource('/api/v1/replay/'+sessionID+'/stream');
      replayEventSource.addEventListener('status',e=>{
        const d=JSON.parse(e.data);
        const status=typeof d.data==='string'?d.data:String(d.data);
        addTimeline('info','回放状态: '+status);
        if(status==='completed'||status==='failed'){
          replayEventSource.close();replayEventSource=null;
        }
      });
      replayEventSource.addEventListener('progress',e=>{
        const d=JSON.parse(e.data);
        addTimeline('info',String(d.data));
      });
      replayEventSource.addEventListener('impact',e=>{
        const d=JSON.parse(e.data);
        if(d.data) renderImpactReport(d.data);
      });
      replayEventSource.addEventListener('error',e=>{
        try{
          const d=JSON.parse(e.data);
          addTimeline('error','回放错误: '+String(d.data));
        }catch{}
      });
      // 诊断任务关联事件（由后端 forwardDiagnosisEvents 转发）
      replayEventSource.addEventListener('diagnosis_task',e=>{
        const d=JSON.parse(e.data);
        addTimeline('info','诊断任务已创建: '+String(d.data).substring(0,8)+'…');
      });
      replayEventSource.addEventListener('step',e=>{
        const d=JSON.parse(e.data);
        if(d.data) renderStep(d.data);
      });
      replayEventSource.addEventListener('diagnosis',e=>{
        const d=JSON.parse(e.data);
        if(d.data) handleDiagnosis(d.data);
      });
      replayEventSource.addEventListener('diagnosis_status',e=>{
        const d=JSON.parse(e.data);
        const st=typeof d.data==='string'?d.data:String(d.data);
        addTimeline('info','诊断状态: '+st);
      });
      replayEventSource.onerror=()=>{};
    }

    function pollReplayResult(sessionID){
      const timer=setInterval(async()=>{
        try{
          const res=await fetch('/api/v1/replay/'+sessionID,{headers:{'Authorization':'Bearer '+API_KEY}});
          if(!res.ok) return;
          const session=await res.json();

          if(session.status==='completed'||session.status==='failed'){
            clearInterval(timer);
            if(timerInterval){clearInterval(timerInterval);timerInterval=null}
            document.getElementById('replay-btn').disabled=false;
            document.getElementById('replay-btn').textContent='开始回放';
            updateBadge(session.status==='completed'?'completed':'failed');
            addTimeline(session.status==='completed'?'ok':'error','回放完成: '+session.status);

            if(session.impact_report){
              renderImpactReport(session.impact_report);
              renderImpactTopo(session.impact_report);
            }

            // 如果有关联的诊断任务，也拉取诊断结果
            if(session.task_id){
              try{
                const tRes=await fetch('/api/v1/tasks/'+session.task_id,{headers:{'Authorization':'Bearer '+API_KEY}});
                if(tRes.ok){
                  const taskData=await tRes.json();
                  if(taskData.steps){
                    document.getElementById('steps-panel').innerHTML='';
                    stepIndex=0;toolCount=0;
                    taskData.steps.forEach(s=>renderStep(s));
                  }
                  if(taskData.diagnosis) handleDiagnosis(taskData.diagnosis);
                }
              }catch{}
            } else {
              document.getElementById('steps-panel').innerHTML='<div class="text-center text-sm py-8" style="color:var(--text-4)">此次回放未启用自动诊断</div>';
            }
          }
        }catch{}
      },2000);
    }

    /* ── 影响面拓扑渲染 ── */
    function renderImpactTopo(report){
      if(!report||!report.affected_services) return;
      document.getElementById('topo-placeholder').style.display='none';
      const g=document.getElementById('topo-graph');
      g.style.display='flex';
      g.innerHTML='';
      g.style.flexDirection='column';
      g.style.gap='.75rem';

      // 顶部 blast radius badge
      const header=document.createElement('div');
      header.style.cssText='display:flex;justify-content:center;margin-bottom:.25rem';
      header.innerHTML=`<span class="blast-badge ${report.blast_radius}">${(report.blast_radius||'low').toUpperCase()}</span>`;
      g.appendChild(header);

      // 服务节点
      const row=document.createElement('div');
      row.style.cssText='display:flex;align-items:flex-start;justify-content:center;gap:.625rem;flex-wrap:wrap';

      report.affected_services.forEach(svc=>{
        const node=document.createElement('div');
        node.className='impact-topo-node '+svc.status;
        const errPct=Math.round((svc.error_rate||0)*100);
        const sizeScale=Math.min(1+svc.error_count/50,1.5);
        node.style.transform=`scale(${sizeScale})`;
        node.innerHTML=`
          <span class="node-dot"></span>
          <span class="node-name">${escHtml(svc.name)}</span>
          <div class="node-metrics">
            <div>${svc.status.toUpperCase()}</div>
            <div>Err: ${errPct}%${svc.p99_latency_ms?' · P99: '+svc.p99_latency_ms+'ms':''}</div>
          </div>`;
        row.appendChild(node);
      });
      g.appendChild(row);
    }

    /* ── 影响面报告渲染 ── */
    function renderImpactReport(report){
      if(!report) return;

      const panel=document.getElementById('impact-report-panel');
      panel.style.display='block';

      // blast badge
      const badge=document.getElementById('blast-badge');
      badge.style.display='inline-flex';
      badge.className='blast-badge '+(report.blast_radius||'low');
      badge.textContent=(report.blast_radius||'LOW').toUpperCase();

      const content=document.getElementById('impact-report-content');
      const overallErr=report.total_requests>0?Math.round(report.failed_requests/report.total_requests*100):0;
      const affected=report.affected_services?report.affected_services.filter(s=>s.status!=='healthy').length:0;
      const total=report.affected_services?report.affected_services.length:0;

      let html=`
        <div class="grid grid-cols-3 gap-2 mb-3">
          <div class="stat-card text-center"><div class="stat-val text-sm">${report.total_requests||0}</div><div class="stat-label">请求总量</div></div>
          <div class="stat-card text-center"><div class="stat-val text-sm" style="color:#ef4444">${report.failed_requests||0}</div><div class="stat-label">失败量</div></div>
          <div class="stat-card text-center"><div class="stat-val text-sm">${overallErr}%</div><div class="stat-label">错误率</div></div>
        </div>
        <div class="text-xs mb-2" style="color:var(--text-3)">受影响服务: ${affected}/${total}</div>`;

      // 服务指标表
      if(report.affected_services&&report.affected_services.length>0){
        html+=`<table class="w-full text-xs" style="border-collapse:collapse">
          <thead><tr style="color:var(--text-3)">
            <th class="text-left py-1 px-1">服务</th>
            <th class="text-center py-1 px-1">状态</th>
            <th class="text-right py-1 px-1">错误数</th>
            <th class="text-right py-1 px-1">错误率</th>
          </tr></thead><tbody>`;
        report.affected_services.forEach(svc=>{
          const statusColor=svc.status==='down'?'#ef4444':svc.status==='degraded'?'#f59e0b':'#10b981';
          html+=`<tr style="border-top:1px solid var(--border)">
            <td class="py-1 px-1" style="color:var(--text-2)">${escHtml(svc.name)}</td>
            <td class="text-center py-1 px-1"><span style="color:${statusColor};font-weight:600">${svc.status.toUpperCase()}</span></td>
            <td class="text-right py-1 px-1" style="color:var(--text-2)">${svc.error_count}</td>
            <td class="text-right py-1 px-1" style="color:var(--text-2)">${Math.round((svc.error_rate||0)*100)}%</td>
          </tr>`;
        });
        html+=`</tbody></table>`;
      }

      // LLM 总结
      if(report.summary){
        html+=`<div class="mt-3 p-2.5 rounded-lg text-xs" style="background:var(--bg-card2);color:var(--text-2);line-height:1.6">${escHtml(report.summary)}</div>`;
      }

      content.innerHTML=html;
    }

    // 页面加载时预获取场景列表
    fetchScenarios();
    /* ═══════════ 演示模式 ═══════════ */
    let demoMode = false;
    let logSSE = null;
    let logCount = 0;
    const MAX_LOG_LINES = 200;

    // namespace 颜色映射
    const NS_COLORS = {
      'prj-apigateway': '#60a5fa',
      'prj-ubill': '#a78bfa',
      'prj-uhost': '#34d399',
      'prj-uresource': '#fbbf24',
      'prj-unet': '#f472b6',
      'prj-udb': '#fb923c',
    };

    function toggleDemoMode(){
      demoMode = !demoMode;
      const toggle = document.getElementById('demo-toggle');
      toggle.classList.toggle('on', demoMode);

      if(demoMode){
        startLiveAndLog();
      } else {
        stopLiveAndLog();
      }
    }

    async function startLiveAndLog(){
      // 启动 Live Generator
      try {
        await fetch('/api/v1/mock/live/start', {
          method:'POST',
          headers:{'Authorization':'Bearer '+API_KEY}
        });
      } catch(e) {
        console.error('start live failed:', e);
      }

      // 显示日志面板
      document.getElementById('live-log-panel').style.display = '';

      // 连接日志 SSE
      connectLogSSE();
    }

    async function stopLiveAndLog(){
      // 停止 Live Generator
      try {
        await fetch('/api/v1/mock/live/stop', {
          method:'POST',
          headers:{'Authorization':'Bearer '+API_KEY}
        });
      } catch(e) {
        console.error('stop live failed:', e);
      }

      // 断开 SSE
      if(logSSE) { logSSE.close(); logSSE = null; }

      // 隐藏日志面板
      document.getElementById('live-log-panel').style.display = 'none';
    }

    function connectLogSSE(){
      if(logSSE) logSSE.close();
      logSSE = new EventSource('/api/v1/logs/stream');
      logSSE.addEventListener('log', e => {
        const evt = JSON.parse(e.data);
        appendLogLine(evt);
      });
      logSSE.onerror = () => {};
    }

    function appendLogLine(evt){
      const terminal = document.getElementById('log-terminal');
      const line = document.createElement('div');

      const nsColor = NS_COLORS[evt.namespace] || '#94a3b8';
      const levelColor = evt.level === 'ERROR' ? '#ef4444' : evt.level === 'WARN' ? '#fbbf24' : '#94a3b8';
      const bgFlash = evt.level === 'ERROR' ? 'background:rgba(239,68,68,0.1);' : '';

      const ts = evt.timestamp ? evt.timestamp.substring(11, 23) : '';
      const ns = (evt.namespace || '').replace('prj-', '');
      const msg = truncateMsg(evt.message || '', 120);

      line.style.cssText = bgFlash + 'white-space:nowrap;';
      line.innerHTML = `<span style="color:#475569">${escHtml(ts)}</span> <span style="color:${nsColor};font-weight:600">[${escHtml(ns)}]</span> <span style="color:${levelColor};font-weight:bold">${evt.level||'INFO'}</span> <span style="color:#cbd5e1">${escHtml(msg)}</span>`;

      terminal.appendChild(line);
      logCount++;
      document.getElementById('log-count').textContent = logCount;

      // 限制行数
      while(terminal.children.length > MAX_LOG_LINES){
        terminal.removeChild(terminal.firstChild);
      }

      // 自动滚动
      terminal.scrollTop = terminal.scrollHeight;

      // ERROR 行闪烁
      if(evt.level === 'ERROR'){
        line.style.animation = 'fadeSlide .3s ease both';
      }
    }

    function truncateMsg(s, n){
      // 对于 JSON message 只取前 n 字符
      if(s.length <= n) return s;
      return s.substring(0, n) + '…';
    }

    function clearLogPanel(){
      document.getElementById('log-terminal').innerHTML = '';
      logCount = 0;
      document.getElementById('log-count').textContent = '0';
    }

    /* ═══════════ Live 生成器控制（监控面板用） ═══════════ */
    async function toggleLiveGen(){
      const btn = document.getElementById('live-toggle-btn');
      try {
        const statusRes = await fetch('/api/v1/mock/live/status', {headers:{'Authorization':'Bearer '+API_KEY}});
        const status = await statusRes.json();

        if(status.running){
          await fetch('/api/v1/mock/live/stop', {method:'POST', headers:{'Authorization':'Bearer '+API_KEY}});
          btn.textContent = '启动 Live';
          document.getElementById('live-status').textContent = '状态: 已停止';
          document.getElementById('live-log-panel').style.display = 'none';
          if(logSSE) { logSSE.close(); logSSE = null; }
        } else {
          await fetch('/api/v1/mock/live/start', {method:'POST', headers:{'Authorization':'Bearer '+API_KEY}});
          btn.textContent = '停止 Live';
          document.getElementById('live-status').textContent = '状态: 运行中';
          document.getElementById('live-log-panel').style.display = '';
          connectLogSSE();
        }
      } catch(e) {
        console.error('toggleLiveGen failed:', e);
      }
    }

    /* ═══════════ 置信度动画 ═══════════ */
    const _origHandleDiagnosis = handleDiagnosis;
    handleDiagnosis = function(d) {
      _origHandleDiagnosis(d);
      // 置信度数字跳动动画
      if(d && d.confidence) {
        const target = Math.round(d.confidence * 100);
        const el = document.getElementById('stat-conf');
        let current = 0;
        const step = Math.max(1, Math.floor(target / 30));
        const timer = setInterval(() => {
          current += step;
          if(current >= target) { current = target; clearInterval(timer); }
          el.textContent = current + '%';
        }, 30);
      }
    };

  </script>
</body>
</html>
